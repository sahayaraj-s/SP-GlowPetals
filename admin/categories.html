<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — SP GlowPetals Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="admin-sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="admin-topbar-placeholder"></div>
      <div class="admin-content">

        <!-- Category Form -->
        <div class="admin-card" style="margin-bottom:var(--space-xl)">
          <div class="admin-card-header">
            <div class="admin-card-title" id="cat-form-title">Add Category</div>
            <button id="cancel-cat-edit" class="btn btn-secondary btn-sm" style="display:none">✕ Cancel</button>
          </div>
          <form id="category-form">
            <div class="admin-form-grid">
              <div class="form-group">
                <label class="form-label">Category Name *</label>
                <input type="text" class="form-input" id="cat-name" placeholder="e.g. Gift Candles">
              </div>
              <div class="form-group">
                <label class="form-label">Image Path</label>
                <input 
  type="file" 
  id="cat-image" 
  accept="image/*"
>
              </div>
              <div class="form-group admin-form-full">
                <label class="form-label">Description</label>
                <input type="text" class="form-input" id="cat-description" placeholder="Short category description…">
              </div>
              <div class="admin-form-full">
                <button type="submit" class="btn btn-primary">💾 Save Category</button>
              </div>
            </div>
          </form>
        </div>

        <!-- Categories Table -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title">All Categories</div>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr><th>Name</th><th>Slug</th><th>Description</th><th>Products</th><th>Actions</th></tr>
              </thead>
              <tbody id="categories-tbody">
                <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script src="admin-layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectAdminLayout('Categories', 'categories');
      AdminCategories.init();
    });
  </script>
</body>
</html>
