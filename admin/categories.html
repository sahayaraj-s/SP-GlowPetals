<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories – SP GlowPetals Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<script type="module">
  import { requireAuth, renderAdminShell, adminToast, openModal, closeModal, confirmDelete } from './admin-shell.js';
  import { getCategories, addCategory, updateCategory, deleteCategory, uploadImage } from '../assets/js/firebase.js';

  await requireAuth();
  renderAdminShell('categories', 'Category Management');

  let allCats = [], editingId = null, uploadedImageUrl = '';

  async function init() {
    document.getElementById('adminContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--gray-600)">Loading…</div>';
    allCats = await getCategories();
    renderPage();
  }

 function renderPage() {

  document.getElementById('adminContent').innerHTML = `

  <!-- Modal -->
  <div class="modal-overlay" id="catModal">

    <div class="modal">

      <div class="modal-header">

        <div class="modal-title" id="catModalTitle">
          Add Category
        </div>

        <button class="modal-close"
          onclick="closeModal('catModal')">
          ✕
        </button>

      </div>

      <div class="modal-body">

        <div class="form-row">

          <div class="form-group">
            <label class="form-label">
              Category Name <span>*</span>
            </label>

            <input class="form-control"
              id="cName"
              placeholder="Gift Candles">
          </div>

          <div class="form-group">
            <label class="form-label">
              Slug
            </label>

            <input class="form-control"
              id="cSlug"
              placeholder="candles">
          </div>

        </div>

        <div class="form-row">

          <div class="form-group">
            <label class="form-label">
              Icon
            </label>

            <input class="form-control"
              id="cIcon"
              placeholder="🕯️">
          </div>

          <div class="form-group">
            <label class="form-label">
              Sort Order
            </label>

            <input class="form-control"
              id="cSort"
              type="number">
          </div>

        </div>

        <div class="form-group">

          <label class="form-label">
            Description
          </label>

          <textarea class="form-control"
            id="cDesc"></textarea>

        </div>

        <div class="form-group">

          <label class="form-label">
            Category Image
          </label>

          <div class="upload-area"
            onclick="document.getElementById('catImgInput').click()">

            Click to Upload

          </div>

          <input
            type="file"
            id="catImgInput"
            accept="image/*"
            style="display:none"
            onchange="handleCatImg(this)">

          <div id="catImgPreview"></div>

          <div id="catUploadStatus"></div>

        </div>

        <label style="display:flex;gap:10px;align-items:center;">

          <input type="checkbox"
            id="cActive"
            checked>

          Active

        </label>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary"
          onclick="closeModal('catModal')">

          Cancel

        </button>

        <button class="btn btn-primary"
          id="saveCatBtn"
          onclick="saveCat()">

          Save

        </button>

      </div>

    </div>

  </div>

  <!-- Categories Table -->

  <div class="admin-card">

    <div class="admin-card-header">

      <div class="admin-card-title">
        Store Categories (${allCats.length})
      </div>

      <button class="btn btn-primary btn-sm"
        onclick="openAddCat()">

        <i class="fa fa-plus"></i>
        Add

      </button>

    </div>

    <div class="admin-card-body" style="padding:0">

      <div class="table-wrap">

        <table class="admin-table">

          <thead>

            <tr>
              <th>Icon</th>
              <th>Name</th>
              <th>Slug</th>
              <th>Status</th>
              <th>Type</th>
              <th>Actions</th>
            </tr>

          </thead>

          <tbody>

            ${allCats.map(c => `

            <tr>

              <td style="font-size:1.4rem">
                ${c.icon || '📦'}
              </td>

              <td>
                ${c.name}
              </td>

              <td>
                ${c.slug}
              </td>

              <td>

                <span class="status-badge ${c.active !== false ? 'status-active' : 'status-inactive'}">

                  ${c.active !== false ? 'Active' : 'Inactive'}

                </span>

              </td>

              <td>

                ${c.builtIn ? 'Built-in' : 'Custom'}

              </td>

              <td>

                <div class="action-btns">

                  <button
                    class="action-btn action-btn-edit"
                    onclick="openEditCat('${c.id}')">

                    <i class="fa fa-edit"></i>

                  </button>

                  <button
                    class="action-btn action-btn-delete"
                    onclick="deleteCatItem('${c.id}','${c.name}')">

                    <i class="fa fa-trash"></i>

                  </button>

                </div>

              </td>

            </tr>

            `).join('')}

          </tbody>

        </table>

      </div>

    </div>

  </div>

  `;
}

  window.openAddCat = () => {
    editingId = null; uploadedImageUrl = '';
    document.getElementById('catModalTitle').textContent = 'Add Category';
    ['cName','cSlug','cIcon','cSort','cDesc'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('cActive').checked = true;
    document.getElementById('catImgPreview').innerHTML = '';
    document.getElementById('catUploadStatus').textContent = '';
    openModal('catModal');
  };

  window.openEditCat = (id) => {
    const c = allCats.find(x => x.id === id);
    if (!c) return;
    editingId = id; uploadedImageUrl = c.image || '';
    document.getElementById('catModalTitle').textContent = 'Edit Category';
    document.getElementById('cName').value   = c.name || '';
    document.getElementById('cSlug').value   = c.slug || '';
    document.getElementById('cIcon').value   = c.icon || '';
    document.getElementById('cSort').value   = c.sort || '';
    document.getElementById('cDesc').value   = c.description || '';
    document.getElementById('cActive').checked = c.active !== false;
    document.getElementById('catImgPreview').innerHTML = uploadedImageUrl
      ? `<div class="preview-img-wrap"><img src="${uploadedImageUrl}" alt="Category image"><button class="preview-remove" onclick="clearCatImg()">✕</button></div>`
      : '';
    document.getElementById('catUploadStatus').textContent = uploadedImageUrl ? '✅ Current image loaded' : '';
    openModal('catModal');
  };

  window.clearCatImg = () => { uploadedImageUrl=''; document.getElementById('catImgPreview').innerHTML=''; document.getElementById('catUploadStatus').textContent=''; };

  window.handleCatImg = async (input) => {
    const file = input.files?.[0];
    if (!file) return;
    const status = document.getElementById('catUploadStatus');
    status.textContent = '⏳ Uploading to Cloudinary…'; status.style.color='var(--gray-600)';
    try {
      uploadedImageUrl = await uploadImage(file);
      document.getElementById('catImgPreview').innerHTML = `<div class="preview-img-wrap"><img src="${uploadedImageUrl}" alt="Uploaded"><button class="preview-remove" onclick="clearCatImg()">✕</button></div>`;
      status.textContent = '✅ Uploaded!'; status.style.color='var(--success)';
    } catch(e) { status.textContent = `❌ ${e.message}`; status.style.color='var(--danger)'; }
  };

  window.saveCat = async () => {
    const name = document.getElementById('cName').value.trim();
    if (!name) { adminToast('Category name is required', 'error'); return; }
    const slug = document.getElementById('cSlug').value.trim() || name.toLowerCase().replace(/\s+/g,'-');
    const btn  = document.getElementById('saveCatBtn');
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving…'; btn.disabled = true;
    const data = {
      name, slug,
      icon:        document.getElementById('cIcon').value.trim(),
      sort:        parseInt(document.getElementById('cSort').value) || 0,
      description: document.getElementById('cDesc').value.trim(),
      image:       uploadedImageUrl,
      active:      document.getElementById('cActive').checked,
    };
    try {
      if (editingId) { await updateCategory(editingId, data); adminToast('Category updated!'); }
      else           { await addCategory(data);               adminToast('Category added!'); }
      closeModal('catModal');
      allCats = await getCategories();
      renderPage();
    } catch(e) { adminToast(`Error: ${e.message}`, 'error'); }
    finally { btn.innerHTML = '<i class="fa fa-save"></i> Save'; btn.disabled = false; }
  };

  window.deleteCatItem = async (id, name) => {
    if (!confirmDelete(`Delete category "${name}"?`)) return;
    try { await deleteCategory(id); adminToast('Deleted'); allCats = await getCategories(); renderPage(); }
    catch(e) { adminToast(`Error: ${e.message}`, 'error'); }
  };

  await init();
</script>
</body>
</html>
