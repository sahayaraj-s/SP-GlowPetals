<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banners — SP GlowPetals Admin</title>
  <link rel="icon" type="image/png" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="admin-sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="admin-topbar-placeholder"></div>
      <div class="admin-content">

        <!-- Banner Form -->
        <div class="admin-card" style="margin-bottom:var(--space-xl)">
          <div class="admin-card-header">
            <div class="admin-card-title" id="banner-form-title">Add New Banner</div>
            <button id="cancel-banner-edit" class="btn btn-secondary btn-sm" style="display:none">✕ Cancel</button>
          </div>
          <form id="banner-form">
            <div class="admin-form-grid">
              <div class="form-group">
                <label class="form-label">Banner Title *</label>
                <input type="text" class="form-input" id="banner-title" placeholder="Gift Love, Gift Memories">
              </div>
              <div class="form-group">
                <label class="form-label">Tag Line</label>
                <input type="text" class="form-input" id="banner-tag" placeholder="New Collection">
              </div>
              <div class="form-group admin-form-full">
                <label class="form-label">Subtitle</label>
                <input type="text" class="form-input" id="banner-subtitle" placeholder="Handcrafted gifts for every occasion…">
              </div>
              <div class="form-group admin-form-full">
                <label class="form-label">Image Path *</label>
                <input 
  type="file" 
  id="banner-image" 
  accept="image/*"
>
                <div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">Place banner images in assets/images/ folder</div>
              </div>
              <div class="form-group">
                <label class="form-label">Button Text</label>
                <input type="text" class="form-input" id="banner-btn-text" placeholder="Shop Now">
              </div>
              <div class="form-group">
                <label class="form-label">Button URL</label>
                <input type="text" class="form-input" id="banner-btn-url" placeholder="pages/shop.html">
              </div>
              <div class="admin-form-full">
                <button type="submit" class="btn btn-primary btn-lg">💾 Save Banner</button>
              </div>
            </div>
          </form>
        </div>

        <!-- Banners Table -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title">All Banners</div>
          </div>
          <div style="margin-bottom:var(--space-md);font-size:.82rem;color:var(--text-muted)">
            💡 Banners are displayed in the hero slider on the homepage. Toggle active/inactive status anytime.
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr><th>Preview</th><th>Title</th><th>Tag</th><th>Button</th><th>Active</th><th>Actions</th></tr>
              </thead>
              <tbody id="banners-tbody">
                <tr><td colspan="6" style="text-align:center;padding:var(--space-2xl);color:var(--text-muted)">No banners yet. Add your first banner above!</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script src="admin-layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectAdminLayout('Banners', 'banners');
      AdminBanners.init();
    });
  </script>
</body>
</html>
