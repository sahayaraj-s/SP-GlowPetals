<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers – SP GlowPetals Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<script type="module">
  import { requireAuth, renderAdminShell, adminToast } from './admin-shell.js';
  import { getOrders } from '../assets/js/firebase.js';

  await requireAuth();
  renderAdminShell('customers', 'Customer Management');

  const content = document.getElementById('adminContent');

  async function init() {
    content.innerHTML = `<div style="text-align:center;padding:60px;">Loading customers…</div>`;
    const orders = await getOrders();

    // Build customer map from orders
    const customerMap = {};
    orders.forEach(o => {
      const phone = o.customer?.phone;
      if (!phone) return;
      if (!customerMap[phone]) {
        customerMap[phone] = { name: o.customer.name, phone, email: o.customer.email||'', address: o.customer.address||'', orders: [], totalSpent: 0 };
      }
      customerMap[phone].orders.push(o);
      if (o.status !== 'cancelled') customerMap[phone].totalSpent += o.total || 0;
    });

    const customers = Object.values(customerMap).sort((a,b) => b.totalSpent - a.totalSpent);

    content.innerHTML = `
    <div class="stats-grid" style="margin-bottom:20px;">
      <div class="stat-card"><div class="stat-icon pink"><i class="fa fa-users"></i></div><div><div class="stat-value">${customers.length}</div><div class="stat-label">Total Customers</div></div></div>
      <div class="stat-card"><div class="stat-icon gold"><i class="fa fa-rupee-sign"></i></div><div><div class="stat-value">₹${customers.reduce((s,c)=>s+c.totalSpent,0).toLocaleString('en-IN')}</div><div class="stat-label">Total Revenue</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fa fa-shopping-bag"></i></div><div><div class="stat-value">${orders.length}</div><div class="stat-label">Total Orders</div></div></div>
      <div class="stat-card"><div class="stat-icon blue"><i class="fa fa-star"></i></div><div><div class="stat-value">${customers.filter(c=>c.orders.length>1).length}</div><div class="stat-label">Repeat Customers</div></div></div>
    </div>
    <div class="admin-card">
      <div class="admin-card-header">
        <div class="admin-card-title">All Customers (${customers.length})</div>
        <div class="search-input-admin">
          <i class="fa fa-search"></i>
          <input type="text" id="searchCust" placeholder="Search by name, phone…" oninput="filterCust(this.value)">
        </div>
      </div>
      <div class="admin-card-body" style="padding:0;">
        <div class="table-wrap">
          <table class="admin-table" id="custTable">
            <thead><tr><th>#</th><th>Customer</th><th>Phone</th><th>Email</th><th>Orders</th><th>Total Spent</th><th>Actions</th></tr></thead>
            <tbody id="custBody">
              ${customers.length ? customers.map((c, i) => `
              <tr data-name="${c.name?.toLowerCase()}" data-phone="${c.phone}">
                <td style="color:var(--gray-600);font-size:0.85rem;">${i+1}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:10px;">
                    <div style="width:36px;height:36px;border-radius:50%;background:var(--pink-pale);color:var(--pink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;">${(c.name||'G').charAt(0).toUpperCase()}</div>
                    <div class="td-name">${c.name||'Guest'}</div>
                  </div>
                </td>
                <td style="font-size:0.88rem;">${c.phone}</td>
                <td style="font-size:0.85rem;color:var(--gray-600);">${c.email||'—'}</td>
                <td><span style="font-weight:700;color:var(--text-dark);">${c.orders.length}</span> <span style="font-size:0.78rem;color:var(--gray-600);">order${c.orders.length!==1?'s':''}</span></td>
                <td class="td-price">₹${c.totalSpent.toLocaleString('en-IN')}</td>
                <td>
                  <div class="action-btns">
                    <a href="https://wa.me/${c.phone.replace(/[^0-9]/g,'')}" target="_blank" class="action-btn action-btn-view" title="WhatsApp"><i class="fa fa-comment"></i></a>
                    ${c.email ? `<a href="mailto:${c.email}" class="action-btn action-btn-edit" title="Email"><i class="fa fa-envelope"></i></a>` : ''}
                  </div>
                </td>
              </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-600);">No customers yet. Orders will appear here.</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;

    window.filterCust = (q) => {
      const rows = document.querySelectorAll('#custBody tr[data-name]');
      rows.forEach(row => {
        const match = row.dataset.name?.includes(q.toLowerCase()) || row.dataset.phone?.includes(q);
        row.style.display = match ? '' : 'none';
      });
    };
  }

  await init();
</script>
</body>
</html>
