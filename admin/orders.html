<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — SP GlowPetals Admin</title>
  <link rel="icon" type="image/png" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="admin-sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="admin-topbar-placeholder"></div>
      <div class="admin-content">

        <!-- Order Stats -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-md);margin-bottom:var(--space-xl)" id="order-stats"></div>

        <!-- Orders Table -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title">All Orders</div>
            <div class="admin-toolbar">
              <select class="form-select" id="order-status-filter" style="padding:8px 14px;font-size:.85rem">
                <option value="">All Status</option>
                <option>Pending</option><option>Processing</option>
                <option>Shipped</option><option>Delivered</option><option>Cancelled</option>
              </select>
            </div>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Order ID</th><th>Customer</th><th>Phone</th>
                  <th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Action</th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                <tr><td colspan="8" style="text-align:center;padding:var(--space-2xl);color:var(--text-muted)">No orders yet</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="toast-container"></div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="order-modal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h3 class="section-title" style="font-size:1.2rem" id="modal-order-id">Order Details</h3>
        <button class="modal-close">✕</button>
      </div>
      <div id="modal-order-content"></div>
    </div>
  </div>

  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script src="admin-layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectAdminLayout('Orders', 'orders');
      if (!Auth.requireAuth()) return;
      document.getElementById('admin-username').textContent = Auth.getUser();
      renderOrderStats();
      renderOrders();
      document.getElementById('order-status-filter')?.addEventListener('change', renderOrders);
      document.querySelectorAll('.admin-logout').forEach(btn => btn.addEventListener('click', () => { if(confirm('Logout?')) Auth.logout(); }));
    });

    function renderOrderStats() {
      const orders = DB.getOrders();
      const statuses = ['Pending','Processing','Shipped','Delivered'];
      const colors = ['#f59e0b','#3b82f6','#8b5cf6','#22c55e'];
      const icons = ['⏳','🔄','📦','✅'];
      const container = document.getElementById('order-stats');
      if (!container) return;
      container.innerHTML = statuses.map((s,i) => {
        const count = orders.filter(o => o.status === s).length;
        return `<div class="admin-stat-card" style="padding:var(--space-lg)">
          <div style="font-size:1.5rem;margin-bottom:8px">${icons[i]}</div>
          <div class="admin-stat-value" style="font-size:1.5rem;color:${colors[i]}">${count}</div>
          <div class="admin-stat-label">${s}</div>
        </div>`;
      }).join('');
    }

    function renderOrders() {
      const tbody = document.getElementById('orders-tbody');
      if (!tbody) return;
      const filter = document.getElementById('order-status-filter')?.value;
      let orders = DB.getOrders();
      if (filter) orders = orders.filter(o => o.status === filter);

      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:var(--space-2xl);color:var(--text-muted)">No orders found</td></tr>`;
        return;
      }

      const statusColors = {Pending:'#f59e0b',Processing:'#3b82f6',Shipped:'#8b5cf6',Delivered:'#22c55e',Cancelled:'#ef4444'};
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td><div class="table-name" style="font-size:.8rem">${o.id}</div></td>
          <td>${o.address?.name || '—'}</td>
          <td>${o.address?.phone || '—'}</td>
          <td>${o.items?.length || 0} items</td>
          <td>₹${(o.total||0).toLocaleString('en-IN')}</td>
          <td style="font-size:.78rem;color:var(--text-muted)">${new Date(o.date).toLocaleDateString('en-IN')}</td>
          <td>
            <select onchange="updateStatus('${o.id}',this.value)"
              style="padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-secondary);font-size:.78rem;font-weight:700;color:${statusColors[o.status]||'var(--text-primary)'}">
              ${['Pending','Processing','Shipped','Delivered','Cancelled'].map(s=>
                `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </td>
          <td>
            <button class="table-action-btn" onclick="viewOrder('${o.id}')" title="View">👁️</button>
          </td>
        </tr>`).join('');
    }

    function updateStatus(id, status) {
      DB.updateOrderStatus(id, status);
      renderOrderStats();
      Toast.success('Order status updated!');
    }

    function viewOrder(id) {
      const o = DB.getOrders().find(x => x.id === id);
      if (!o) return;
      document.getElementById('modal-order-id').textContent = 'Order: ' + o.id;
      document.getElementById('modal-order-content').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);margin-bottom:var(--space-lg)">
          <div><div style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Customer</div>
            <div style="font-weight:600">${o.address?.name || '—'}</div>
            <div style="font-size:.82rem;color:var(--text-muted)">${o.address?.phone}</div>
            <div style="font-size:.82rem;color:var(--text-muted)">${o.address?.email}</div>
          </div>
          <div><div style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Delivery Address</div>
            <div style="font-size:.85rem;line-height:1.6">${o.address?.line1}<br>${o.address?.city}, ${o.address?.state} - ${o.address?.pincode}</div>
          </div>
        </div>
        <div style="margin-bottom:var(--space-lg)">
          <div style="font-size:.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:var(--space-md)">Ordered Items</div>
          ${(o.items||[]).map(item => `
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem">
              <span>${item.name} × ${item.qty}</span>
              <span style="font-weight:600;color:var(--primary)">₹${(DB.getDiscountedPrice(item)*item.qty).toLocaleString('en-IN',{maximumFractionDigits:0})}</span>
            </div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding-top:var(--space-md);font-weight:700;font-size:1rem">
            <span>Total</span>
            <span style="color:var(--primary)">₹${(o.total||0).toLocaleString('en-IN')}</span>
          </div>
        </div>
        <div style="display:flex;gap:var(--space-md);flex-wrap:wrap">
          <a href="https://wa.me/${o.address?.phone?.replace(/\D/g,'')}" target="_blank" class="btn btn-whatsapp btn-sm">💬 Contact Customer</a>
        </div>`;
      Modal.open('order-modal');
    }
  </script>
</body>
</html>
