<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — SP GlowPetals</title>
  <link rel="icon" type="image/png" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/navbar-footer.css">
  <style>
    .not-found-hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl) var(--space-lg);
    }
    .not-found-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      line-height: 1;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-md);
    }
    .not-found-icon {
      font-size: 4rem;
      margin-bottom: var(--space-lg);
      animation: float-icon 3s ease-in-out infinite;
    }
    @keyframes float-icon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    .not-found-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--text-primary);
      margin-bottom: var(--space-md);
    }
    .not-found-sub {
      color: var(--text-muted);
      max-width: 400px;
      margin: 0 auto var(--space-xl);
      font-size: .95rem;
    }
    .not-found-actions {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main>
    <div class="not-found-hero">
      <div class="not-found-icon">🌸</div>
      <div class="not-found-code">404</div>
      <h1 class="not-found-title">Oops! This page got lost in our garden</h1>
      <p class="not-found-sub">The page you're looking for doesn't exist or has been moved. Let's guide you back to something beautiful.</p>
      <div class="not-found-actions">
        <a href="../index.html" class="btn btn-primary btn-lg">🏠 Back to Home</a>
        <a href="shop.html" class="btn btn-secondary btn-lg">🎁 Browse Gifts</a>
        <a href="contact.html" class="btn btn-ghost btn-lg" style="border-color:var(--border);color:var(--text-secondary)">💬 Contact Us</a>
      </div>
      <div style="margin-top:var(--space-3xl);display:flex;gap:var(--space-lg);flex-wrap:wrap;justify-content:center">
        <a href="shop.html?cat=Gift+Candles" style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-size:.82rem;text-decoration:none;transition:color .2s" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
          <span style="font-size:2rem">🕯️</span>Candles
        </a>
        <a href="shop.html?cat=Flowers" style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-size:.82rem;text-decoration:none;transition:color .2s" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
          <span style="font-size:2rem">🌸</span>Flowers
        </a>
        <a href="shop.html?cat=Surprise+Boxes" style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-size:.82rem;text-decoration:none;transition:color .2s" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
          <span style="font-size:2rem">🎁</span>Surprise Boxes
        </a>
        <a href="shop.html?cat=Romantic+Gifts" style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-size:.82rem;text-decoration:none;transition:color .2s" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
          <span style="font-size:2rem">💝</span>Romantic
        </a>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/components.js"></script>
</body>
</html>
