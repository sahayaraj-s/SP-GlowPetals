<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed! – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .success-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;}
    .success-card{background:white;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:60px 48px;max-width:560px;width:100%;text-align:center;border:1px solid var(--gray-200);}
    .success-icon{font-size:5rem;margin-bottom:20px;animation:bounce 0.6s ease;}
    @keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
    .success-title{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--text-dark);margin-bottom:10px;}
    .success-sub{color:var(--gray-600);font-size:1rem;margin-bottom:30px;line-height:1.7;}
    .order-id{background:var(--pink-pale);border-radius:var(--radius-md);padding:14px;font-size:0.88rem;color:var(--text-body);margin-bottom:28px;}
    .order-id strong{color:var(--pink);font-size:1rem;}
    .success-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .steps{display:flex;justify-content:center;gap:0;margin:32px 0;position:relative;}
    .steps::before{content:'';position:absolute;top:14px;left:14%;right:14%;height:2px;background:var(--pink-light);}
    .step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;}
    .step-dot{width:30px;height:30px;border-radius:50%;background:var(--pink);color:white;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:700;z-index:1;}
    .step-label{font-size:0.75rem;color:var(--gray-600);text-align:center;}
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="success-wrap">
    <div class="success-card">
      <div class="success-icon">🎉</div>
      <h1 class="success-title">Order Placed!</h1>
      <p class="success-sub">Thank you for shopping with <strong>SP GlowPetals</strong>! Your beautiful gift is on its way. We'll confirm your order shortly via WhatsApp.</p>
      <div class="order-id">Order ID: <strong id="orderId">Loading…</strong></div>
      <div class="steps">
        <div class="step"><div class="step-dot">✓</div><div class="step-label">Order Placed</div></div>
        <div class="step"><div class="step-dot" style="background:var(--pink-light);color:var(--pink);">2</div><div class="step-label">Confirmed</div></div>
        <div class="step"><div class="step-dot" style="background:var(--pink-light);color:var(--pink);">3</div><div class="step-label">Packed</div></div>
        <div class="step"><div class="step-dot" style="background:var(--pink-light);color:var(--pink);">4</div><div class="step-label">Delivered</div></div>
      </div>
      <div class="success-actions">
        <a href="../index.html" class="btn btn-primary">Continue Shopping ✦</a>
        <a href="https://wa.me/919384845814?text=Hi!%20I%20placed%20an%20order%20and%20want%20to%20track%20it." target="_blank" class="btn btn-outline">💬 Track on WhatsApp</a>
      </div>
    </div>
  </div>
  <div id="footer"></div>
  <script type="module">
    import { renderNavbar, renderFooter } from '../assets/js/components.js';
    renderNavbar(''); renderFooter();
    const id = new URLSearchParams(location.search).get('id');
    document.getElementById('orderId').textContent = id ? `#${id.slice(-8).toUpperCase()}` : '#GLOWPETALS';
  </script>
</body>
</html>
