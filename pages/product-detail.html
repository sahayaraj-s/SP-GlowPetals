<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .product-detail-layout { display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:start; }
    .gallery-main {
      position:relative; border-radius:var(--radius-lg); overflow:hidden;
      background:var(--pink-pale); margin-bottom:12px; cursor:zoom-in;
      height:520px; display:flex; align-items:center; justify-content:center;
    }
    .gallery-main img { max-width:95%; max-height:95%; object-fit:contain; transition:transform 0.4s ease; }
    .gallery-main:hover img { transform:scale(1.07); }
    .gallery-thumbs { display:flex; gap:10px; flex-wrap:wrap; }
    .gallery-thumb { width:72px; height:72px; border-radius:var(--radius-sm); overflow:hidden; cursor:pointer; border:2px solid transparent; transition:var(--transition); background:var(--pink-pale); flex-shrink:0; }
    .gallery-thumb.active { border-color:var(--pink); }
    .gallery-thumb img { width:100%; height:100%; object-fit:cover; }
    .product-detail-info { position:sticky; top:90px; }
    .product-detail-category { font-size:0.8rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--pink); margin-bottom:10px; }
    .product-detail-name { font-family:var(--font-display); font-size:2rem; font-weight:600; color:var(--text-dark); margin-bottom:14px; line-height:1.2; }
    .product-detail-price { display:flex; align-items:baseline; gap:14px; margin:16px 0; flex-wrap:wrap; }
    .detail-price { font-size:2rem; font-weight:700; color:var(--pink); }
    .detail-original { font-size:1.2rem; color:var(--gray-400); text-decoration:line-through; }
    .detail-discount { background:var(--pink); color:white; padding:4px 12px; border-radius:30px; font-size:0.82rem; font-weight:700; }
    .product-detail-desc { color:var(--gray-600); line-height:1.8; margin:16px 0; font-size:0.95rem; }
    .qty-selector { display:flex; align-items:center; border:1.5px solid var(--gray-200); border-radius:30px; overflow:hidden; width:fit-content; }
    .qty-btn { width:40px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; color:var(--pink); transition:var(--transition); border:none; background:transparent; }
    .qty-btn:hover { background:var(--pink-pale); }
    .qty-val { width:44px; text-align:center; font-weight:700; font-size:1rem; color:var(--text-dark); border:none; outline:none; background:transparent; }
    .product-actions-row { display:flex; gap:12px; margin:20px 0; flex-wrap:wrap; }
    .product-actions-row .btn { flex:1; min-width:140px; justify-content:center; gap:8px; }
    .btn-buy-now { background:var(--text-dark); color:white; border:2px solid var(--text-dark); }
    .btn-buy-now:hover { background:var(--pink); border-color:var(--pink); }
    .product-meta { background:var(--pink-pale); border-radius:var(--radius-md); padding:18px; margin-top:20px; }
    .meta-row { display:flex; align-items:center; gap:12px; font-size:0.88rem; padding:8px 0; color:var(--text-body); border-bottom:1px solid rgba(255,79,139,0.1); }
    .meta-row:last-child { border-bottom:none; }
    .meta-row i { width:20px; color:var(--pink); text-align:center; }
    .tabs { margin-top:48px; }
    .tab-headers { display:flex; gap:0; border-bottom:2px solid var(--gray-200); }
    .tab-btn { padding:12px 24px; font-size:0.9rem; font-weight:600; color:var(--gray-600); cursor:pointer; border:none; background:transparent; border-bottom:2px solid transparent; margin-bottom:-2px; transition:var(--transition); }
    .tab-btn.active { color:var(--pink); border-bottom-color:var(--pink); }
    .tab-content { padding:28px 0; display:none; }
    .tab-content.active { display:block; }
    .review-card { padding:20px; border:1px solid var(--gray-200); border-radius:var(--radius-md); margin-bottom:14px; }
    .related-title { font-family:var(--font-display); font-size:1.6rem; margin:60px 0 24px; }
    .share-row { margin-top:16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .share-row span { font-size:0.82rem; color:var(--gray-600); }
    @media(max-width:900px){.product-detail-layout{grid-template-columns:1fr;}.product-detail-info{position:static;}}
    @media(max-width:480px){.product-detail-name{font-size:1.5rem;}.detail-price{font-size:1.5rem;}.product-actions-row .btn{min-width:120px;}}
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader"><div class="loader-ring"></div><div class="loader-text">GlowPetals ✦</div></div>
  <div id="navbar"></div>

  <div class="container" style="padding-top:20px;">
    <div class="breadcrumb">
      <a href="../index.html">Home</a><span>/</span>
      <a href="../pages/shop.html">Shop</a><span>/</span>
      <span class="current" id="breadcrumbName">Product</span>
    </div>
  </div>

  <section class="section" style="padding-top:20px;">
    <div class="container">
      <div id="productContent">
        <div style="text-align:center;padding:80px;color:var(--gray-600);">
          <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;color:var(--pink);"></i>
          <div style="margin-top:12px;">Loading product…</div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <a href="https://wa.me/919384845814" target="_blank" class="whatsapp-float" title="Chat on WhatsApp">
    <div class="whatsapp-pulse"></div>
    <i class="fa-brands fa-whatsapp" style="font-size:1.6rem;color:white;"></i>
  </a>

  <script type="module">
    import { renderNavbar, renderFooter, productCardHTML, bindProductCardEvents,
             showLoader, hideLoader, showToast, Cart, Wishlist, formatINR } from '../assets/js/components.js';
    import { getProduct, getProducts } from '../assets/js/firebase.js';

    await renderNavbar('shop');
    renderFooter();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '../pages/shop.html'; }

    let qty = 1;

    async function init() {
      showLoader();
      try {
        const p = await getProduct(id);
        if (!p) {
          document.getElementById('productContent').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i class="fa-regular fa-face-sad-tear" style="font-size:3rem;color:var(--pink);"></i></div>
              <h3>Product Not Found</h3>
              <p>This product might have been removed.</p>
              <a href="../pages/shop.html" class="btn btn-primary">Back to Shop</a>
            </div>`;
          hideLoader();
          return;
        }

        document.title = `${p.name} – SP GlowPetals`;
        document.getElementById('breadcrumbName').textContent = p.name;

        const imgs     = p.images?.length ? p.images : (p.image ? [p.image] : []);
        const discount = p.originalPrice ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
        const wishlisted = Wishlist.has(p.id);
        const inStock    = p.stock > 0;

        document.getElementById('productContent').innerHTML = `
          <div class="product-detail-layout">
            <!-- Gallery -->
            <div>
              <div class="gallery-main" id="galleryMain">
                <img id="mainImg"
                  src="${imgs[0] || '../assets/images/placeholder.jpg'}"
                  alt="${p.name}"
                  onerror="this.src='../assets/images/placeholder.jpg'">
              </div>
              ${imgs.length > 1 ? `
              <div class="gallery-thumbs" id="galleryThumbs">
                ${imgs.map((img, i) =>
                  `<div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="setThumb(this,'${img}')">
                    <img src="${img}" alt="" onerror="this.src='../assets/images/placeholder.jpg'">
                  </div>`
                ).join('')}
              </div>` : ''}
            </div>
            <!-- Info -->
            <div class="product-detail-info">
              <div class="product-detail-category">
                <i class="fa-solid fa-tag" style="margin-right:5px;font-size:0.75em;"></i>${p.category || ''}
              </div>
              <h1 class="product-detail-name">${p.name}</h1>
              <div class="product-rating" style="margin-bottom:12px;">
                <span class="stars">${'★'.repeat(Math.round(p.rating || 4))}${'☆'.repeat(5 - Math.round(p.rating || 4))}</span>
                <span class="rating-count" style="margin-left:8px;">(${p.reviews || 0} reviews)</span>
              </div>
              <div class="product-detail-price">
                <span class="detail-price">${formatINR(p.price)}</span>
                ${p.originalPrice ? `<span class="detail-original">${formatINR(p.originalPrice)}</span>` : ''}
                ${discount > 0 ? `<span class="detail-discount">${discount}% OFF</span>` : ''}
              </div>
              <p class="product-detail-desc">${p.description || 'A beautifully crafted premium gift, perfect for any occasion. Made with love and attention to detail.'}</p>

              ${p.variants?.length ? `
              <div style="margin:16px 0;">
                <div style="font-size:0.85rem;font-weight:700;margin-bottom:10px;">Select Variant:</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  ${p.variants.map(v => `<button class="btn btn-outline btn-sm">${v}</button>`).join('')}
                </div>
              </div>` : ''}

              <!-- Quantity + Stock -->
              <div style="display:flex;align-items:center;gap:20px;margin:20px 0;flex-wrap:wrap;">
                <div class="qty-selector">
                  <button class="qty-btn" onclick="changeQty(-1)" aria-label="Decrease quantity">
                    <i class="fa-solid fa-minus" style="font-size:0.8rem;"></i>
                  </button>
                  <input class="qty-val" id="qtyVal" type="number" value="1" min="1" max="99" readonly>
                  <button class="qty-btn" onclick="changeQty(1)" aria-label="Increase quantity">
                    <i class="fa-solid fa-plus" style="font-size:0.8rem;"></i>
                  </button>
                </div>
                <span style="font-size:0.85rem;">
                  ${inStock
                    ? `<span style="color:#059669;font-weight:600;"><i class="fa-solid fa-circle-check"></i> In Stock</span>
                       <span style="color:var(--gray-500);margin-left:6px;">(${p.stock} left)</span>`
                    : `<span style="color:#dc2626;font-weight:600;"><i class="fa-solid fa-circle-xmark"></i> Out of Stock</span>`}
                </span>
              </div>

              <!-- Primary Actions: Add to Cart + Buy Now -->
              <div class="product-actions-row">
                <button class="btn btn-primary" id="addToCartBtn" onclick="addToCartNow()" ${!inStock ? 'disabled' : ''}>
                  <i class="fa-solid fa-bag-shopping"></i>
                  Add to Cart
                </button>
                <button class="btn btn-buy-now" id="buyNowBtn" onclick="buyNow()" ${!inStock ? 'disabled' : ''}>
                  <i class="fa-solid fa-bolt"></i>
                  Buy Now
                </button>
              </div>

              <!-- Wishlist -->
              <button class="btn btn-outline" id="wishlistBtn" onclick="toggleWishlist()"
                style="width:100%;justify-content:center;gap:8px;margin-bottom:16px;
                  ${wishlisted ? 'background:var(--pink);color:white;border-color:var(--pink);' : ''}">
                <i class="fa-${wishlisted ? 'solid' : 'regular'} fa-heart"></i>
                ${wishlisted ? 'Wishlisted' : 'Add to Wishlist'}
              </button>

              <!-- Meta info -->
              <div class="product-meta">
                <div class="meta-row"><i class="fa-solid fa-truck-fast"></i><span><strong>Fast Delivery</strong> — Order before 4 PM</span></div>
                <div class="meta-row"><i class="fa-solid fa-gift"></i><span><strong>Premium Packing</strong> on all orders</span></div>
                <div class="meta-row"><i class="fa-solid fa-shield-halved"></i><span><strong>Secure Payment</strong> — UPI &amp; more</span></div>
               
              </div>

              <!-- Share row -->
              <div class="share-row">
                <span>Share:</span>
                <a href="https://wa.me/?text=${encodeURIComponent('Check this out! ' + location.href)}"
                  target="_blank" class="btn btn-sm btn-outline" style="gap:6px;">
                  <i class="fa-brands fa-whatsapp" style="color:#25d366;"></i> WhatsApp
                </a>
              </div>
            </div>
          </div>

          <!-- Tabs -->
          <div class="tabs">
            <div class="tab-headers">
              <button class="tab-btn active" onclick="switchTab(this,'desc')">Description</button>
              <button class="tab-btn" onclick="switchTab(this,'reviews')">Reviews (${p.reviews || 0})</button>
              <button class="tab-btn" onclick="switchTab(this,'shipping')">Shipping &amp; Returns</button>
            </div>
            <div class="tab-content active" id="tab-desc">
              <p style="color:var(--gray-600);line-height:1.9;">${p.description || 'This is a premium quality product from SP GlowPetals, handcrafted with care and delivered beautifully wrapped for your loved ones.'}</p>
              ${p.features?.length ? `
              <ul style="margin-top:16px;display:flex;flex-direction:column;gap:8px;">
                ${p.features.map(f => `
                <li style="display:flex;align-items:center;gap:8px;color:var(--text-body);font-size:0.92rem;">
                  <i class="fa-solid fa-sparkles" style="color:var(--pink);font-size:0.8rem;"></i>${f}
                </li>`).join('')}
              </ul>` : ''}
            </div>
            <div class="tab-content" id="tab-reviews">
              <div style="margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">
                  <div style="text-align:center;">
                    <div style="font-size:3rem;font-weight:700;font-family:var(--font-display);color:var(--pink);">${p.rating || '4.5'}</div>
                    <div class="stars" style="font-size:1.2rem;">${'★'.repeat(Math.round(p.rating || 4))}</div>
                    <div style="font-size:0.82rem;color:var(--gray-600);margin-top:4px;">${p.reviews || 0} reviews</div>
                  </div>
                </div>
              </div>
              <div class="review-card">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><strong>Priya S.</strong><span style="color:#fbbf24;">★★★★★</span></div>
                <p style="color:var(--gray-600);font-size:0.92rem;">Absolutely beautiful! My sister loved the surprise. The packaging was top-notch and delivery was super fast. Highly recommend!</p>
              </div>
              <div class="review-card">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><strong>Arjun K.</strong><span style="color:#fbbf24;">★★★★★</span></div>
                <p style="color:var(--gray-600);font-size:0.92rem;">Premium quality product. Worth every rupee. Will definitely order again for our next anniversary!</p>
              </div>
            </div>
            <div class="tab-content" id="tab-shipping">
              <div style="display:flex;flex-direction:column;gap:16px;">
                <div style="display:flex;gap:16px;align-items:flex-start;">
                  <i class="fa-solid fa-truck-fast" style="font-size:1.4rem;color:var(--pink);margin-top:2px;"></i>
                  <div><strong>Same Day Delivery</strong><p style="color:var(--gray-600);font-size:0.9rem;margin-top:4px;">Order before 4 PM for same-day delivery in Chennai. Available for select pin codes.</p></div>
                </div>
                <div style="display:flex;gap:16px;align-items:flex-start;">
                  <i class="fa-solid fa-box" style="font-size:1.4rem;color:var(--pink);margin-top:2px;"></i>
                  <div><strong>Standard Shipping</strong><p style="color:var(--gray-600);font-size:0.9rem;margin-top:4px;">Free shipping on orders above ₹599. Standard delivery in 2–4 business days.</p></div>
                </div>
                
              </div>
            </div>
          </div>

          <!-- Related Products -->
          <div>
            <h3 class="related-title">You May Also Like</h3>
            <div class="products-grid" id="relatedProducts">
              <div style="grid-column:1/-1;text-align:center;color:var(--gray-600);padding:20px;">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading…
              </div>
            </div>
          </div>`;

        // Load related products
        const related = await getProducts({ category: p.category });
        const others  = related.filter(r => r.id !== p.id).slice(0, 4);
        const relEl   = document.getElementById('relatedProducts');
        if (others.length) {
          relEl.innerHTML = others.map(r => productCardHTML(r)).join('');
          bindProductCardEvents(relEl, others);
        } else {
          relEl.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--gray-600);padding:20px;">No related products found.</div>';
        }

        // Store for actions
        window.__product = p;

      } catch (e) {
        console.error(e);
        document.getElementById('productContent').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fa-regular fa-face-sad-tear" style="font-size:3rem;color:var(--pink);"></i></div>
            <h3>Error loading product</h3>
            <p>${e.message}</p>
            <a href="../pages/shop.html" class="btn btn-primary">Back to Shop</a>
          </div>`;
      } finally {
        hideLoader();
      }
    }

    // ── Actions ──────────────────────────────────────────────────────
    window.changeQty = (d) => {
      qty = Math.max(1, qty + d);
      document.getElementById('qtyVal').value = qty;
    };

    window.addToCartNow = () => {
      if (!window.__product) return;
      Cart.add(window.__product, qty);
      const btn = document.getElementById('addToCartBtn');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Added to Cart!';
      btn.style.background = '#059669';
      btn.style.borderColor = '#059669';
      setTimeout(() => {
        btn.innerHTML = '<i class="fa-solid fa-bag-shopping"></i> Add to Cart';
        btn.style.background = '';
        btn.style.borderColor = '';
      }, 2000);
    };

    window.buyNow = () => {
      if (!window.__product) return;
      // Add to cart then redirect to checkout immediately
      Cart.add(window.__product, qty);
      location.href = '../pages/checkout.html';
    };

    window.toggleWishlist = () => {
      if (!window.__product) return;
      const added = Wishlist.toggle(window.__product);
      const btn   = document.getElementById('wishlistBtn');
      btn.style.background    = added ? 'var(--pink)' : '';
      btn.style.color         = added ? 'white' : '';
      btn.style.borderColor   = added ? 'var(--pink)' : '';
      btn.innerHTML = `<i class="fa-${added ? 'solid' : 'regular'} fa-heart"></i> ${added ? 'Wishlisted' : 'Add to Wishlist'}`;
    };

    window.setThumb = (el, src) => {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    };

    window.switchTab = (btn, tab) => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    };

    init();
  </script>
</body>
</html>
