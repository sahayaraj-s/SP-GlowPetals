<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .checkout-layout { display:grid; grid-template-columns:1fr 380px; gap:28px; align-items:start; }
    .checkout-section { background:white; border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:28px; margin-bottom:20px; }
    .checkout-section-title { font-family:var(--font-display); font-size:1.1rem; font-weight:600; color:var(--text-dark); margin-bottom:22px; display:flex; align-items:center; gap:12px; }
    .step-badge { width:28px; height:28px; border-radius:50%; background:var(--pink); color:white; font-size:0.78rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .payment-options { display:flex; flex-direction:column; gap:10px; }
    .payment-option { border:2px solid var(--gray-200); border-radius:var(--radius-md); padding:14px 18px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:var(--transition); }
    .payment-option:hover { border-color:var(--pink-light); background:var(--pink-pale); }
    .payment-option.selected { border-color:var(--pink); background:var(--pink-pale); }
    .payment-option input[type=radio] { accent-color:var(--pink); width:17px; height:17px; flex-shrink:0; cursor:pointer; }
    .payment-option-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    .payment-option-label { font-weight:600; color:var(--text-dark); font-size:0.9rem; }
    .payment-option-desc { font-size:0.78rem; color:var(--gray-500); margin-top:2px; }
    .order-summary-card { background:white; border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:24px; position:sticky; top:90px; }
    .order-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-100); }
    .order-item:last-of-type { border-bottom:none; }
    .order-item-img { width:56px; height:56px; border-radius:var(--radius-sm); object-fit:cover; border:1px solid var(--gray-200); flex-shrink:0; background:var(--pink-pale); }
    .order-item-name { font-weight:600; font-size:0.85rem; color:var(--text-dark); line-height:1.3; }
    .order-item-qty { font-size:0.76rem; color:var(--gray-500); margin-top:3px; }
    .order-item-price { font-weight:700; color:var(--pink); font-size:0.9rem; margin-left:auto; flex-shrink:0; }
    .summary-divider { border:none; border-top:1px solid var(--gray-200); margin:14px 0; }
    .summary-row-sm { display:flex; justify-content:space-between; font-size:0.86rem; padding:5px 0; color:var(--text-body); }
    .summary-total-lg { display:flex; justify-content:space-between; font-size:1.1rem; font-weight:700; color:var(--text-dark); padding:14px 0; border-top:2px solid var(--gray-200); margin-top:6px; }
    .secure-strip { text-align:center; font-size:0.75rem; color:var(--gray-500); margin-top:12px; display:flex; align-items:center; justify-content:center; gap:6px; }
    .checkout-steps { display:flex; align-items:center; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .cstep { display:flex; align-items:center; gap:6px; font-size:0.82rem; color:var(--gray-400); }
    .cstep.active { color:var(--pink); font-weight:700; }
    .cstep i { font-size:0.7rem; }
    .cstep-sep { color:var(--gray-300); font-size:0.7rem; }
    @media(max-width:900px){ .checkout-layout{grid-template-columns:1fr;} .order-summary-card{position:static;} }
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader"><div class="loader-ring"></div><div class="loader-text">GlowPetals ✦</div></div>
  <div id="navbar"></div>

  <div style="background:var(--pink-pale);padding:36px 0;border-bottom:1px solid var(--pink-light);">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index.html">Home</a><span>/</span>
        <a href="cart.html">Cart</a><span>/</span>
        <span class="current">Checkout</span>
      </div>
      <h1 style="font-size:1.9rem;display:flex;align-items:center;gap:12px;margin-top:8px;">
        <i class="fa-solid fa-lock" style="color:var(--pink);font-size:1.5rem;"></i>
        Secure Checkout
      </h1>
      <!-- Checkout steps indicator -->
      <div class="checkout-steps" style="margin-top:14px;">
        <div class="cstep active"><i class="fa-solid fa-truck"></i> Delivery</div>
        <span class="cstep-sep"><i class="fa-solid fa-chevron-right"></i></span>
        <div class="cstep active"><i class="fa-solid fa-credit-card"></i> Payment</div>
        <span class="cstep-sep"><i class="fa-solid fa-chevron-right"></i></span>
        <div class="cstep"><i class="fa-solid fa-circle-check"></i> Confirmation</div>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="checkoutContent">
        <div style="text-align:center;padding:40px;">
          <i class="fa-solid fa-spinner fa-spin" style="font-size:1.5rem;color:var(--pink);"></i>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter, Cart, showToast, formatINR, hideLoader } from '../assets/js/components.js';
    import { addOrder } from '../assets/js/firebase.js';

    await await renderNavbar('');
    renderFooter();

    const items = Cart.get();
    if (!items.length) { location.href = 'cart.html'; }

    const subtotal    = Cart.total();
    const shipping    = subtotal >= 599 ? 0 : 60;
    const total       = subtotal + shipping;
    let selectedPayment = 'upi';

    document.getElementById('checkoutContent').innerHTML = `
    <div class="checkout-layout">
      <!-- Left: Form -->
      <div>
        <!-- Contact -->
        <div class="checkout-section">
          <div class="checkout-section-title">
            <div class="step-badge">1</div>
            <span><i class="fa-solid fa-user" style="color:var(--pink);margin-right:6px;"></i>Contact Information</span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name <span style="color:var(--pink);">*</span></label>
              <input class="form-control" id="firstName" placeholder="Priya" autocomplete="given-name">
            </div>
            <div class="form-group">
              <label class="form-label">Last Name <span style="color:var(--pink);">*</span></label>
              <input class="form-control" id="lastName" placeholder="Sharma" autocomplete="family-name">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Phone Number <span style="color:var(--pink);">*</span></label>
              <input class="form-control" id="phone" type="tel" placeholder="+91 98765 43210" autocomplete="tel">
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input class="form-control" id="email" type="email" placeholder="your@email.com" autocomplete="email">
            </div>
          </div>
        </div>

        <!-- Delivery Address -->
        <div class="checkout-section">
          <div class="checkout-section-title">
            <div class="step-badge">2</div>
            <span><i class="fa-solid fa-location-dot" style="color:var(--pink);margin-right:6px;"></i>Delivery Address</span>
          </div>
          <div class="form-group">
            <label class="form-label">Full Address <span style="color:var(--pink);">*</span></label>
            <textarea class="form-control" id="address" rows="3" placeholder="House No., Street, Area, Landmark…" autocomplete="street-address"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">City <span style="color:var(--pink);">*</span></label>
              <input class="form-control" id="city" placeholder="Chennai" autocomplete="address-level2">
            </div>
            <div class="form-group">
              <label class="form-label">State</label>
              <input class="form-control" id="state" placeholder="Tamil Nadu" autocomplete="address-level1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">PIN Code <span style="color:var(--pink);">*</span></label>
              <input class="form-control" id="pincode" placeholder="600001" maxlength="6" autocomplete="postal-code">
            </div>
            <div class="form-group">
              <label class="form-label">Preferred Delivery Date</label>
              <input class="form-control" id="deliveryDate" type="date">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">
              <i class="fa-solid fa-gift" style="color:var(--pink);margin-right:5px;font-size:0.85em;"></i>
              Gift Message / Special Instructions
            </label>
            <textarea class="form-control" id="giftMessage" rows="2"
              placeholder="e.g. Please add a birthday card: 'Happy Birthday Priya! 🎉'"></textarea>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout-section">
          <div class="checkout-section-title">
            <div class="step-badge">3</div>
            <span><i class="fa-solid fa-credit-card" style="color:var(--pink);margin-right:6px;"></i>Payment Method</span>
          </div>
          <div class="payment-options">

            <label class="payment-option selected" onclick="selectPayment(this,'upi')">
              <input type="radio" name="payment" value="upi" checked>
              <div class="payment-option-icon" style="background:#e8f5e9;">
                <i class="fa-solid fa-mobile-screen-button" style="color:#2e7d32;"></i>
              </div>
              <div style="flex:1;">
                <div class="payment-option-label">UPI / QR Code</div>
                <div class="payment-option-desc">Pay instantly via GPay, PhonePe, Paytm, or any UPI app</div>
              </div>
              <span style="font-size:0.72rem;background:#e8f5e9;color:#2e7d32;padding:3px 8px;border-radius:20px;font-weight:700;">INSTANT</span>
            </label>


          </div>

          <!-- UPI detail panel -->
          <div id="upiPanel" style="margin-top:16px;padding:16px;background:var(--pink-pale);border-radius:var(--radius-md);border:1px solid var(--pink-light);">
            <div style="font-size:0.85rem;font-weight:700;color:var(--text-dark);margin-bottom:8px;display:flex;align-items:center;gap:6px;">
              <i class="fa-solid fa-circle-info" style="color:var(--pink);"></i>
              After placing order, pay via UPI to complete your order
            </div>
            <div style="font-size:0.82rem;color:var(--gray-600);line-height:1.7;">
              <div><i class="fa-brands fa-google-pay" style="color:#4285f4;margin-right:6px;"></i>GPay &nbsp;·&nbsp;
                   <i class="fa-solid fa-p" style="color:#5f259f;margin-right:4px;"></i>PhonePe &nbsp;·&nbsp;
                   Paytm &nbsp;·&nbsp; Any UPI App</div>
              <div style="margin-top:6px;font-weight:600;">UPI ID: <span style="color:var(--pink);">spglowpetals@upi</span></div>
            </div>
          </div>

        </div>

        <!-- Place Order button -->
        <button class="btn btn-primary btn-lg" id="placeOrderBtn"
          style="width:100%;justify-content:center;font-size:0.95rem;padding:16px;gap:10px;"
          onclick="placeOrder()">
          <i class="fa-solid fa-bag-shopping"></i>
          Place Order — ${formatINR(total)}
          <i class="fa-solid fa-arrow-right"></i>
        </button>
        <p class="secure-strip">
          <i class="fa-solid fa-shield-halved" style="color:var(--pink);"></i>
          Your information is safe &amp; secure · SSL Encrypted
        </p>
      </div>

      <!-- Right: Order Summary -->
      <div>
        <div class="order-summary-card">
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;">
            <i class="fa-solid fa-receipt" style="color:var(--pink);"></i> Order Summary
          </div>
          ${items.map(item => `
          <div class="order-item">
            <img class="order-item-img"
              src="${item.image || item.images?.[0] || '../assets/images/placeholder.jpg'}"
              alt="${item.name}"
              onerror="this.src='../assets/images/placeholder.jpg'">
            <div style="flex:1;min-width:0;">
              <div class="order-item-name">${item.name}</div>
              <div class="order-item-qty">Qty: ${item.qty}</div>
            </div>
            <div class="order-item-price">${formatINR(item.price * item.qty)}</div>
          </div>`).join('')}
          <hr class="summary-divider">
          <div class="summary-row-sm"><span>Subtotal</span><span>${formatINR(subtotal)}</span></div>
          <div class="summary-row-sm">
            <span>Shipping</span>
            <span>${shipping === 0
              ? '<span style="color:#059669;font-weight:700;"><i class="fa-solid fa-check"></i> FREE</span>'
              : formatINR(shipping)}</span>
          </div>
          <div class="summary-row-sm" style="color:#059669;">
            <span><i class="fa-solid fa-gift" style="font-size:0.8em;"></i> Gift Wrapping</span>
            <span style="font-weight:700;">FREE</span>
          </div>
          <div class="summary-total-lg">
            <span>Total</span>
            <span style="color:var(--pink);">${formatINR(total)}</span>
          </div>
          <div style="background:var(--pink-pale);border-radius:var(--radius-sm);padding:12px;margin-top:12px;font-size:0.82rem;color:var(--gray-600);">
            <div style="font-weight:700;color:var(--pink);margin-bottom:4px;display:flex;align-items:center;gap:6px;">
              <i class="fa-solid fa-star"></i> Premium Packing Included
            </div>
            <div>Every order comes beautifully wrapped with a personal touch.</div>
          </div>
        </div>

        <!-- Trust badges -->
        <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${[
            ['fa-truck-fast','Fast Delivery','Order before 4 PM'],
            ['fa-rotate-left','Easy Returns','7-day policy'],
            ['fa-shield-halved','Secure Pay','100% safe'],
            ['fa-gift','Gift Wrap','Free on all orders']
          ].map(([icon, title, desc]) => `
          <div style="background:white;border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:12px;text-align:center;">
            <i class="fa-solid ${icon}" style="color:var(--pink);font-size:1.1rem;"></i>
            <div style="font-size:0.78rem;font-weight:700;color:var(--text-dark);margin-top:5px;">${title}</div>
            <div style="font-size:0.72rem;color:var(--gray-500);">${desc}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;

    window.selectPayment = (el, val) => {
      document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedPayment = val;
      const upiPanel = document.getElementById('upiPanel');
      if (upiPanel) upiPanel.style.display = val === 'upi' ? 'block' : 'none';
    };

    window.placeOrder = async () => {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const phone     = document.getElementById('phone').value.trim();
      const address   = document.getElementById('address').value.trim();
      const city      = document.getElementById('city').value.trim();
      const pincode   = document.getElementById('pincode').value.trim();

      // Validation
      if (!firstName || !phone || !address || !city || !pincode) {
        showToast('Please fill all required fields', 'error');
        // Scroll to first empty required field
        const fields = [
          ['firstName', firstName],
          ['phone', phone],
          ['address', address],
          ['city', city],
          ['pincode', pincode]
        ];
        for (const [id, val] of fields) {
          if (!val) {
            document.getElementById(id)?.focus();
            break;
          }
        }
        return;
      }

      if (!/^\d{6}$/.test(pincode)) {
        showToast('Please enter a valid 6-digit PIN code', 'error');
        document.getElementById('pincode')?.focus();
        return;
      }

      const btn = document.getElementById('placeOrderBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Placing Order…';
      btn.disabled = true;

      const customer = {
        name: `${firstName} ${lastName}`.trim(),
        phone,
        email:       document.getElementById('email').value.trim(),
        address:     `${address}, ${city}, ${document.getElementById('state').value.trim()}, ${pincode}`,
        giftMessage: document.getElementById('giftMessage').value.trim(),
        deliveryDate: document.getElementById('deliveryDate').value,
      };

      const orderData = {
        customer, items, subtotal, shipping, total,
        payment: selectedPayment,
        giftWrapping: true
      };

      try {
        const ref = await addOrder(orderData);
        Cart.clear();
        location.href = `order-success.html?id=${ref.id}`;
      } catch (e) {
        console.error(e);
        showToast('Error placing order. Please try again.', 'error');
        btn.innerHTML = `<i class="fa-solid fa-bag-shopping"></i> Place Order — ${formatINR(total)} <i class="fa-solid fa-arrow-right"></i>`;
        btn.disabled = false;
      }
    };

    hideLoader();
  </script>
</body>
</html>
