<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .checkout-layout { display:grid; grid-template-columns:1fr 380px; gap:28px; align-items:start; }
    .checkout-section { background:white; border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:28px; margin-bottom:20px; }
    .checkout-section-title { font-family:var(--font-display); font-size:1.15rem; font-weight:600; color:var(--text-dark); margin-bottom:22px; display:flex; align-items:center; gap:10px; }
    .checkout-section-title span { width:28px; height:28px; border-radius:50%; background:var(--pink); color:white; font-size:0.82rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .payment-options { display:flex; flex-direction:column; gap:12px; }
    .payment-option { border:2px solid var(--gray-200); border-radius:var(--radius-md); padding:14px 18px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:var(--transition); }
    .payment-option.selected { border-color:var(--pink); background:var(--pink-pale); }
    .payment-option input[type=radio] { accent-color:var(--pink); width:18px; height:18px; }
    .payment-option-label { font-weight:600; color:var(--text-dark); font-size:0.92rem; }
    .payment-option-desc { font-size:0.8rem; color:var(--gray-600); margin-top:2px; }
    .order-summary-card { background:white; border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:24px; position:sticky; top:90px; }
    .order-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-100); }
    .order-item:last-of-type { border-bottom:none; }
    .order-item-img { width:56px; height:56px; border-radius:var(--radius-sm); object-fit:cover; border:1px solid var(--gray-200); flex-shrink:0; background:var(--pink-pale); }
    .order-item-name { font-weight:600; font-size:0.88rem; color:var(--text-dark); }
    .order-item-qty { font-size:0.78rem; color:var(--gray-600); }
    .order-item-price { font-weight:700; color:var(--pink); font-size:0.92rem; margin-left:auto; flex-shrink:0; }
    .summary-divider { border:none; border-top:1px solid var(--gray-200); margin:14px 0; }
    .summary-row { display:flex; justify-content:space-between; font-size:0.88rem; padding:6px 0; color:var(--text-body); }
    .summary-total { display:flex; justify-content:space-between; font-size:1.1rem; font-weight:700; color:var(--text-dark); padding:14px 0; border-top:2px solid var(--gray-200); margin-top:8px; }
    @media(max-width:900px){.checkout-layout{grid-template-columns:1fr;}.order-summary-card{position:static;}}
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader"><div class="loader-ring"></div><div class="loader-text">GlowPetals ✦</div></div>
  <div id="navbar"></div>

  <div style="background:var(--pink-pale);padding:40px 0;border-bottom:1px solid var(--pink-light);">
    <div class="container">
      <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><a href="cart.html">Cart</a><span>/</span><span class="current">Checkout</span></div>
      <h1 style="font-size:2rem;">Secure Checkout</h1>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="checkoutContent"></div>
    </div>
  </section>

  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter, Cart, showToast, formatINR, whatsappOrder, hideLoader } from '../assets/js/components.js';
    import { addOrder } from '../assets/js/firebase.js';
    renderNavbar(''); renderFooter();

    const items = Cart.get();
    if (!items.length) { location.href = 'cart.html'; }

    const subtotal = Cart.total();
    const shipping = subtotal >= 599 ? 0 : 60;
    const total = subtotal + shipping;
    let selectedPayment = 'whatsapp';

    document.getElementById('checkoutContent').innerHTML = `
    <div class="checkout-layout">
      <div>
        <div class="checkout-section">
          <div class="checkout-section-title"><span>1</span> Contact Information</div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">First Name *</label><input class="form-control" id="firstName" placeholder="Priya" required></div>
            <div class="form-group"><label class="form-label">Last Name *</label><input class="form-control" id="lastName" placeholder="Sharma" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Phone Number *</label><input class="form-control" id="phone" type="tel" placeholder="+91 98765 43210" required></div>
            <div class="form-group"><label class="form-label">Email Address</label><input class="form-control" id="email" type="email" placeholder="your@email.com"></div>
          </div>
        </div>
        <div class="checkout-section">
          <div class="checkout-section-title"><span>2</span> Delivery Address</div>
          <div class="form-group"><label class="form-label">Full Address *</label><textarea class="form-control" id="address" rows="3" placeholder="House No., Street, Area..." required></textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">City *</label><input class="form-control" id="city" placeholder="Chennai" required></div>
            <div class="form-group"><label class="form-label">State</label><input class="form-control" id="state" placeholder="Tamil Nadu"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">PIN Code *</label><input class="form-control" id="pincode" placeholder="600001" required></div>
            <div class="form-group"><label class="form-label">Delivery Date (Optional)</label><input class="form-control" id="deliveryDate" type="date"></div>
          </div>
          <div class="form-group"><label class="form-label">Special Instructions / Gift Message</label><textarea class="form-control" id="giftMessage" rows="2" placeholder="E.g., Please add a birthday card that says 'Happy Birthday Priya! 🎉'"></textarea></div>
        </div>
        <div class="checkout-section">
          <div class="checkout-section-title"><span>3</span> Payment Method</div>
          <div class="payment-options">
            <label class="payment-option selected" onclick="selectPayment(this,'whatsapp')">
              <input type="radio" name="payment" value="whatsapp" checked>
              <div>
                <div class="payment-option-label">💬 WhatsApp Order (Recommended)</div>
                <div class="payment-option-desc">Send your order via WhatsApp. Pay via UPI, bank transfer, or cash on delivery.</div>
              </div>
            </label>
       
          
          </div>
        </div>
        <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;font-size:1rem;" onclick="placeOrder()">
          🎁 Place Order — ${formatINR(total)}
        </button>
        <p style="text-align:center;font-size:0.8rem;color:var(--gray-600);margin-top:12px;">🔒 Your information is safe & secure</p>
      </div>
      <div>
        <div class="order-summary-card">
          <div style="font-family:var(--font-display);font-size:1.15rem;font-weight:600;margin-bottom:18px;">Order Summary</div>
          ${items.map(item => `
          <div class="order-item">
            <img class="order-item-img" src="${item.image||item.images?.[0]||'../assets/images/placeholder.jpg'}" alt="${item.name}" onerror="this.src='../assets/images/placeholder.jpg'">
            <div style="flex:1;min-width:0;">
              <div class="order-item-name">${item.name}</div>
              <div class="order-item-qty">Qty: ${item.qty}</div>
            </div>
            <div class="order-item-price">${formatINR(item.price * item.qty)}</div>
          </div>`).join('')}
          <hr class="summary-divider">
          <div class="summary-row"><span>Subtotal</span><span>${formatINR(subtotal)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:#059669;font-weight:700;">FREE</span>' : formatINR(shipping)}</span></div>
          <div class="summary-row"><span>Gift Wrapping</span><span style="color:#059669;font-weight:700;">FREE</span></div>
          <div class="summary-total"><span>Total</span><span style="color:var(--pink);">${formatINR(total)}</span></div>
          <div style="background:var(--pink-pale);border-radius:var(--radius-sm);padding:12px;margin-top:12px;font-size:0.82rem;color:var(--gray-600);">
            <div style="font-weight:700;color:var(--pink);margin-bottom:4px;">🎁 Premium Packing Included</div>
            <div>Every order comes beautifully wrapped with a personal touch.</div>
          </div>
        </div>
      </div>
    </div>`;

    window.selectPayment = (el, val) => {
      document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected'); selectedPayment = val;
    };

    window.placeOrder = async () => {
      const fn = document.getElementById('firstName').value.trim();
      const ln = document.getElementById('lastName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const city = document.getElementById('city').value.trim();
      const pincode = document.getElementById('pincode').value.trim();

      if (!fn || !phone || !address || !city || !pincode) { showToast('Please fill all required fields ✱', 'error'); return; }

      const customer = {
        name: `${fn} ${ln}`, phone,
        email: document.getElementById('email').value.trim(),
        address: `${address}, ${city}, ${document.getElementById('state').value}, ${pincode}`,
        giftMessage: document.getElementById('giftMessage').value.trim(),
        deliveryDate: document.getElementById('deliveryDate').value,
      };

      const orderData = { customer, items, subtotal, shipping, total, payment: selectedPayment };

      try {
        const ref = await addOrder(orderData);
        Cart.clear();
        if (selectedPayment === 'whatsapp') { whatsappOrder(items, customer); }
        location.href = `order-success.html?id=${ref.id}`;
      } catch(e) {
        showToast('Error placing order. Please try again.', 'error');
        console.error(e);
      }
    };

    hideLoader();
  </script>
</body>
</html>
