<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop premium gifts at SP GlowPetals — candles, flowers, surprise boxes and personalized gifts.">
  <title>Shop — SP GlowPetals</title>
  <link rel="icon" type="image/png" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/navbar-footer.css">
  <link rel="stylesheet" href="../assets/css/shop.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="page-wrapper">
    <!-- Page Header -->
    <div style="background:var(--bg-secondary);padding:var(--space-2xl) 0 var(--space-xl)">
      <div class="container">
        <div class="breadcrumb">
          <a href="../index.html">Home</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">Shop</span>
        </div>
        <h1 class="section-title" style="font-size:clamp(1.8rem,4vw,2.8rem)">Our Gift Collection</h1>
        <p style="color:var(--text-muted);margin-top:8px">Discover handpicked gifts curated with love for every occasion</p>
      </div>
    </div>

    <div class="section">
      <div class="container">
        <!-- Mobile Filter Toggle -->
        <div style="margin-bottom:var(--space-lg)">
          <button class="filter-toggle-btn" id="filter-toggle">
            <span>⚙️</span> Filters
          </button>
        </div>

        <div class="shop-layout">
          <!-- Sidebar Filters -->
          <aside class="filter-sidebar" id="filter-sidebar">
            <div class="filter-header">
              <div class="filter-title">Filters</div>
              <div class="filter-reset" id="filter-reset">Reset All</div>
            </div>

            <!-- Search -->
            <div class="filter-group">
              <div class="filter-group-title">Search Products</div>
              <input type="text" class="form-input" id="shop-search" placeholder="Search gifts…">
            </div>

            <!-- Categories -->
            <div class="filter-group">
              <div class="filter-group-title">Categories</div>
              <div class="filter-options" id="category-filter-options">
                <!-- Injected by shop.js -->
              </div>
            </div>

            <!-- Price Range -->
            <div class="filter-group">
              <div class="filter-group-title">Price Range</div>
              <div class="price-range-wrap">
                <div class="price-range-slider">
                  <div class="price-range-fill" id="price-range-fill"></div>
                  <input type="range" class="range-input" id="price-min-range" min="0" max="50000" value="0" step="100">
                  <input type="range" class="range-input" id="price-max-range" min="0" max="50000" value="50000" step="100">
                </div>
                <div class="price-display" id="price-display">₹0 – ₹50,000</div>
              </div>
            </div>

            <!-- Availability -->
            <div class="filter-group">
              <div class="filter-group-title">Availability</div>
              <div class="filter-options">
                <label class="filter-option">
                  <div class="filter-checkbox"></div>
                  <span class="filter-option-label">In Stock</span>
                </label>
              </div>
            </div>

            <a href="shop.html" class="btn btn-secondary" style="width:100%;justify-content:center;margin-top:var(--space-md)">View All</a>
          </aside>

          <!-- Products Area -->
          <div>
            <!-- Toolbar -->
            <div class="shop-toolbar">
              <div class="shop-results-count" id="results-count">Showing <span>0</span> products</div>
              <div class="shop-toolbar-right">
                <select class="sort-select" id="sort-select">
                  <option value="latest">Latest</option>
                  <option value="price-asc">Price: Low to High</option>
                  <option value="price-desc">Price: High to Low</option>
                  <option value="name-asc">Name: A–Z</option>
                  <option value="name-desc">Name: Z–A</option>
                </select>
                <div class="view-toggle">
                  <button class="view-btn active" id="view-grid" title="Grid View">▦</button>
                  <button class="view-btn" id="view-list" title="List View">≡</button>
                </div>
              </div>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="shop-products-grid">
              <!-- Skeleton loaders -->
              <div class="skeleton" style="height:360px;border-radius:var(--radius-lg)"></div>
              <div class="skeleton" style="height:360px;border-radius:var(--radius-lg)"></div>
              <div class="skeleton" style="height:360px;border-radius:var(--radius-lg)"></div>
              <div class="skeleton" style="height:360px;border-radius:var(--radius-lg)"></div>
              <div class="skeleton" style="height:360px;border-radius:var(--radius-lg)"></div>
              <div class="skeleton" style="height:360px;border-radius:var(--radius-lg)"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/pages.js"></script>
  <script src="../assets/js/shop.js"></script>
</body>
</html>
