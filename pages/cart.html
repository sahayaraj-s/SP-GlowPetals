<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — SP GlowPetals</title>
  <link rel="icon" type="image/png" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/navbar-footer.css">
  <link rel="stylesheet" href="../assets/css/shop.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="page-wrapper">
    <div style="background:var(--bg-secondary);padding:var(--space-2xl) 0 var(--space-xl)">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Home</a><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Cart</span></div>
        <h1 class="section-title" style="font-size:clamp(1.8rem,4vw,2.8rem)">Shopping Cart</h1>
      </div>
    </div>
    <div class="section">
      <div class="container">
        <div class="cart-layout">
          <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
              <h2 style="font-family:var(--font-display);font-size:1.2rem">Cart Items</h2>
              <button id="clear-cart" style="font-size:.82rem;color:var(--text-muted);cursor:pointer;background:none;border:none;text-decoration:underline">Clear Cart</button>
            </div>
            <div id="cart-items"></div>
            <div style="margin-top:var(--space-xl)">
              <a href="shop.html" class="btn btn-secondary">← Continue Shopping</a>
            </div>
          </div>
          <div>
            <div class="order-summary" id="order-summary">
              <div class="order-summary-title">Order Summary</div>
              <div class="summary-row"><span>Items (<span id="summary-items">0</span>)</span><span class="summary-val" id="summary-subtotal">₹0</span></div>
              <div class="summary-row"><span>Shipping</span><span class="summary-val" id="summary-shipping">₹50</span></div>
              <div class="summary-row" id="discount-row" style="display:none"><span style="color:#22c55e">Coupon Discount</span><span class="summary-val" style="color:#22c55e" id="summary-discount">−₹0</span></div>
              <div class="summary-row total"><span>Total</span><span class="summary-val price" id="summary-total">₹0</span></div>
              <div id="free-shipping-msg" style="font-size:.78rem;color:var(--primary);text-align:center;padding:8px;background:rgba(200,136,74,0.08);border-radius:var(--radius-sm);margin-bottom:var(--space-md);display:none"></div>
              <div class="coupon-wrap">
                <input type="text" class="coupon-input" id="coupon-input" placeholder="Coupon code…">
                <button class="btn btn-secondary btn-sm" id="coupon-btn">Apply</button>
              </div>
              <span id="applied-discount" data-amount="0" hidden></span>
              <a href="checkout.html" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:var(--space-md)">Proceed to Checkout →</a>
              <div style="margin-top:var(--space-md);text-align:center;font-size:.75rem;color:var(--text-muted)">🔒 Secure &amp; Safe Checkout</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/pages.js"></script>
</body>
</html>
