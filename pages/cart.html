<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .cart-layout { display:grid; grid-template-columns:1fr 360px; gap:28px; align-items:start; }
    .cart-table { width:100%; border-collapse:collapse; }
    .cart-table th { padding:12px 16px; text-align:left; font-size:0.78rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--gray-600); border-bottom:2px solid var(--gray-200); }
    .cart-table td { padding:16px; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
    .cart-item-img { width:72px; height:72px; border-radius:var(--radius-sm); object-fit:cover; border:1px solid var(--gray-200); }
    .cart-item-name { font-family:var(--font-display); font-weight:600; color:var(--text-dark); font-size:1rem; margin-bottom:4px; }
    .cart-item-cat { font-size:0.78rem; color:var(--gray-600); }
    .qty-cell { display:flex; align-items:center; gap:0; border:1.5px solid var(--gray-200); border-radius:30px; overflow:hidden; width:fit-content; }
    .qty-cell button { width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; color:var(--pink); border:none; background:transparent; transition:var(--transition); }
    .qty-cell button:hover { background:var(--pink-pale); }
    .qty-cell span { width:36px; text-align:center; font-weight:700; font-size:0.92rem; }
    .remove-btn { width:34px; height:34px; border-radius:50%; border:1.5px solid var(--gray-200); background:transparent; cursor:pointer; color:var(--gray-400); font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
    .remove-btn:hover { border-color:#dc2626; color:#dc2626; background:#fef2f2; }
    .summary-card { background:white; border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:24px; position:sticky; top:90px; }
    .summary-title { font-family:var(--font-display); font-size:1.2rem; font-weight:600; margin-bottom:20px; }
    .summary-row { display:flex; justify-content:space-between; font-size:0.9rem; color:var(--text-body); padding:10px 0; border-bottom:1px solid var(--gray-100); }
    .summary-row.total { font-weight:700; font-size:1.05rem; color:var(--text-dark); border-bottom:none; border-top:2px solid var(--gray-200); margin-top:4px; }
    .summary-row span:last-child { font-weight:600; }
    .coupon-wrap { display:flex; gap:8px; margin:16px 0; }
    .coupon-input { flex:1; padding:10px 14px; border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); font-size:0.9rem; outline:none; transition:var(--transition); }
    .coupon-input:focus { border-color:var(--pink); }
    .savings-badge { background:var(--pink-pale); color:var(--pink); border-radius:var(--radius-sm); padding:10px 14px; font-size:0.85rem; font-weight:600; margin-top:12px; text-align:center; display:none; }
    @media(max-width:900px){.cart-layout{grid-template-columns:1fr;}.summary-card{position:static;}}
    @media(max-width:600px){.cart-table th:nth-child(3),.cart-table td:nth-child(3){display:none;}.cart-table{font-size:0.85rem;}}
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader"><div class="loader-ring"></div><div class="loader-text">GlowPetals ✦</div></div>
  <div id="navbar"></div>

  <div style="background:var(--pink-pale);padding:40px 0;border-bottom:1px solid var(--pink-light);">
    <div class="container">
      <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><span class="current">Cart</span></div>
      <h1 style="font-size:2rem;">Shopping Cart</h1>
    </div>
  </div>

  <section class="section">
    <div class="container" id="cartMain">
      <div style="text-align:center;padding:40px;">Loading…</div>
    </div>
  </section>

  <div id="footer"></div>
  <a href="https://wa.me/919384845814" target="_blank" class="whatsapp-float"><div class="whatsapp-pulse"></div><span>💬</span></a>

  <script type="module">
    import { renderNavbar, renderFooter, Cart, showToast, formatINR, whatsappOrder } from '../assets/js/components.js';
    renderNavbar(''); renderFooter();

    const COUPONS = { 'GLOW10': 10, 'PETALS20': 20, 'FIRST15': 15 };
    let discount = 0;

    function render() {
      const items = Cart.get();
      const main = document.getElementById('cartMain');
      if (!items.length) {
        main.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Add some beautiful gifts to your cart!</p><a href="../pages/shop.html" class="btn btn-primary btn-lg">Continue Shopping ✦</a></div>`;
        return;
      }
      const subtotal = Cart.total();
      const shipping = subtotal >= 599 ? 0 : 60;
      const discountAmt = Math.round(subtotal * discount / 100);
      const total = subtotal - discountAmt + shipping;

      main.innerHTML = `
      <div class="cart-layout">
        <div>
          <div style="background:white;border:1px solid var(--gray-200);border-radius:var(--radius-lg);overflow:hidden;">
            <div style="padding:18px 20px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;">
              <h3 style="font-family:var(--font-display);font-size:1.1rem;">Cart Items (${items.length})</h3>
              <button onclick="Cart.clear();render();" style="font-size:0.82rem;color:#dc2626;cursor:pointer;border:none;background:none;font-weight:600;">Clear All</button>
            </div>
            <div style="overflow-x:auto;">
              <table class="cart-table">
                <thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th></th></tr></thead>
                <tbody>
                  ${items.map(item => `
                  <tr>
                    <td>
                      <div style="display:flex;align-items:center;gap:14px;">
                        <img class="cart-item-img" src="${item.image||item.images?.[0]||'../assets/images/placeholder.jpg'}" alt="${item.name}" onerror="this.src='../assets/images/placeholder.jpg'">
                        <div>
                          <div class="cart-item-name">${item.name}</div>
                          <div class="cart-item-cat">${item.category||''}</div>
                        </div>
                      </div>
                    </td>
                    <td style="font-weight:600;color:var(--pink);">${formatINR(item.price)}</td>
                    <td>
                      <div class="qty-cell">
                        <button onclick="updateQty('${item.id}',${item.qty-1})">−</button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty('${item.id}',${item.qty+1})">+</button>
                      </div>
                    </td>
                    <td style="font-weight:700;color:var(--text-dark);">${formatINR(item.price * item.qty)}</td>
                    <td><button class="remove-btn" onclick="removeItem('${item.id}')">✕</button></td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
          <div style="margin-top:20px;display:flex;gap:14px;flex-wrap:wrap;">
            <a href="../pages/shop.html" class="btn btn-outline">← Continue Shopping</a>
            <a href="https://wa.me/919384845814?text=${encodeURIComponent('Hi! I want to place an order:\n'+items.map(i=>`• ${i.name} x${i.qty} = ₹${i.price*i.qty}`).join('\n')+`\n\nTotal: ₹${total}`)}" target="_blank" class="btn btn-primary">💬 Order via WhatsApp</a>
          </div>
        </div>
        <div>
          <div class="summary-card">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row"><span>Subtotal (${items.reduce((s,i)=>s+i.qty,0)} items)</span><span>${formatINR(subtotal)}</span></div>
            ${discountAmt > 0 ? `<div class="summary-row" style="color:#059669;"><span>Discount (${discount}%)</span><span>−${formatINR(discountAmt)}</span></div>` : ''}
            <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:#059669;font-weight:700;">FREE</span>' : formatINR(shipping)}</span></div>
            ${shipping > 0 ? `<div style="font-size:0.8rem;color:var(--gray-600);padding:4px 0;">Add ${formatINR(599-subtotal)} more for free shipping</div>` : ''}
            <div class="summary-row total"><span>Total</span><span style="color:var(--pink);">${formatINR(total)}</span></div>
            <div class="coupon-wrap">
              <input class="coupon-input" id="couponInput" placeholder="Enter coupon code" value="">
              <button class="btn btn-outline btn-sm" onclick="applyCoupon()">Apply</button>
            </div>
            <div class="savings-badge" id="savingsBadge" ${discountAmt>0?'style="display:block"':''}>
              🎉 You're saving ${formatINR(discountAmt)}!
            </div>
            <a href="checkout.html" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:16px;padding:14px;">Proceed to Checkout →</a>
            <div style="text-align:center;margin-top:14px;font-size:0.8rem;color:var(--gray-600);">🔒 Secure checkout · Free gift wrapping</div>
          </div>
          <div style="background:var(--pink-pale);border-radius:var(--radius-md);padding:16px;margin-top:14px;">
            <div style="font-size:0.82rem;color:var(--gray-600);display:flex;flex-direction:column;gap:8px;">
              <div>💳 <strong>Try coupon:</strong> (If Available)</div>
              <div>🚀 Fast delivery on orders before 4 PM</div>
              <div>🎁 Free premium gift wrapping on all orders</div>
            </div>
          </div>
        </div>
      </div>`;
    }

    window.updateQty = (id, qty) => { if (qty < 1) { Cart.remove(id); } else { Cart.update(id, qty); } render(); };
    window.removeItem = (id) => { Cart.remove(id); showToast('Item removed from cart', 'info'); render(); };
    window.applyCoupon = () => {
      const code = document.getElementById('couponInput')?.value.trim().toUpperCase();
      if (COUPONS[code]) { discount = COUPONS[code]; showToast(`Coupon applied! ${discount}% off 🎉`, 'success'); render(); }
      else { showToast('Invalid or expired coupon code', 'error'); }
    };

    const { hideLoader } = await import('../assets/js/components.js');
    render(); hideLoader();
  </script>
</body>
</html>
