<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — SP GlowPetals</title>
  <link rel="icon" type="image/png" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/navbar-footer.css">
  <link rel="stylesheet" href="../assets/css/home.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="page-wrapper">
    <!-- Header -->
    <div style="background:var(--gradient-brand);padding:var(--space-3xl) 0;text-align:center;position:relative;overflow:hidden">
      <div style="position:absolute;top:-40%;right:-10%;width:500px;height:500px;border-radius:50%;background:rgba(255,255,255,.05)"></div>
      <div class="container" style="position:relative">
        <div class="section-tag" style="color:rgba(255,255,255,.7)">Browse</div>
        <h1 style="font-family:var(--font-display);font-size:clamp(2.2rem,5vw,3.5rem);color:#fff;margin:var(--space-md) 0">All Gift Categories</h1>
        <p style="color:rgba(255,255,255,.75);max-width:480px;margin:0 auto">Find exactly what you're looking for — from candles to flowers to personalized keepsakes</p>
      </div>
    </div>

    <div class="section">
      <div class="container">
        <div class="grid-auto" id="all-categories-grid">
          <!-- Skeleton -->
          <div class="skeleton" style="height:280px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:280px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:280px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:280px;border-radius:var(--radius-lg)"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>

  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('all-categories-grid');
      if (!grid) return;
      const cats = DB.getCategories();
      if (!cats.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📦</div><h3>No categories yet</h3><p>Admin can add categories from the dashboard.</p></div>`;
        return;
      }
      grid.innerHTML = cats.map((cat, i) => {
        const count = DB.getProducts().filter(p => p.category === cat.name).length;
        return `
          <a href="shop.html?cat=${encodeURIComponent(cat.name)}" style="text-decoration:none">
            <div class="card reveal reveal-delay-${(i%4)+1}" style="position:relative;overflow:hidden;cursor:pointer">
              <div style="aspect-ratio:4/3;overflow:hidden;background:var(--bg-secondary)">
                <img src="${cat.image || '../assets/images/cat-'+( i+1)+'.png'}" alt="${cat.name}"
                  style="width:100%;height:100%;object-fit:cover;transition:transform .5s ease"
                  onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;font-size:4rem\'>🎁</div>'"
                  onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
              </div>
              <div style="padding:var(--space-lg)">
                <h3 style="font-family:var(--font-display);font-size:1.2rem;font-weight:600;color:var(--text-primary);margin-bottom:4px">${cat.name}</h3>
                <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:var(--space-md)">${cat.description || 'Explore our curated collection'}</p>
                <div style="display:flex;align-items:center;justify-content:space-between">
                  <span style="font-size:.78rem;font-weight:600;color:var(--primary)">${count} Products</span>
                  <span style="font-size:.82rem;color:var(--primary);font-weight:600">Shop Now →</span>
                </div>
              </div>
            </div>
          </a>`;
      }).join('');
      ScrollReveal.init();
    });
  </script>
</body>
</html>
