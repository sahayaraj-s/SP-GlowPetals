<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .cat-hero{background:linear-gradient(135deg,var(--pink-pale),white);padding:60px 0;text-align:center;border-bottom:1px solid var(--pink-light);}
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px;}
    .cat-card{border-radius:var(--radius-xl);overflow:hidden;position:relative;aspect-ratio:4/5;cursor:pointer;transition:var(--transition);box-shadow:var(--shadow-sm);}
    .cat-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);}
    .cat-card-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:7rem;}
    .cat-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,26,46,0.9) 0%,rgba(26,26,46,0.1) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:28px;}
    .cat-card-name{font-family:var(--font-display);color:white;font-size:1.4rem;font-weight:600;margin-bottom:6px;}
    .cat-card-desc{color:rgba(255,255,255,0.75);font-size:0.85rem;margin-bottom:16px;line-height:1.5;}
    .cat-card-btn{display:inline-flex;align-items:center;gap:6px;background:white;color:var(--pink);padding:9px 18px;border-radius:30px;font-size:0.82rem;font-weight:700;transition:var(--transition);width:fit-content;}
    .cat-card:hover .cat-card-btn{background:var(--pink);color:white;}
    @media(max-width:600px){.cat-grid{grid-template-columns:repeat(2,1fr);gap:14px;}.cat-card-name{font-size:1.1rem;}.cat-card-desc{display:none;}}
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="cat-hero">
    <div class="container">
      <div class="breadcrumb" style="justify-content:center;"><a href="../index.html">Home</a><span>/</span><span class="current">Categories</span></div>
      <span class="tag">Browse Collections</span>
      <h1 style="margin-top:14px;">All Gift Categories</h1>
      <p style="color:var(--gray-600);max-width:520px;margin:12px auto;">Explore our curated collections of premium gifts for every occasion and every budget.</p>
    </div>
  </div>
  <section class="section">
    <div class="container">

  <div class="cat-grid" id="catGrid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;">
    Loading categories...
  </div>
</div>
        </div>

  <!-- Newsletter strip -->
  <div class="newsletter-section">
    <div class="container">
      <h2>Get Gifting Inspiration & Offers</h2>
      <p style="color:var(--gray-600);margin-top:8px;">Subscribe and be the first to know about new collections and exclusive deals.</p>
      <form class="newsletter-form" onsubmit="e=>e.preventDefault()">
        <input class="newsletter-input" type="email" placeholder="Your email address…" required>
        <button class="newsletter-btn" type="submit">Subscribe ✦</button>
      </form>
    </div>
  </div>
  <div id="footer"></div>
  <a href="https://wa.me/919384845814" target="_blank" class="whatsapp-float"><div class="whatsapp-pulse"></div><span>💬</span></a>
  <script type="module">
    import { renderNavbar, renderFooter } from '../assets/js/components.js';
    import { getCategories } from '../assets/js/firebase.js';
    renderNavbar('categories'); renderFooter();
    async function loadCategories() {

  try {

    const categories = await getCategories();

    const grid = document.getElementById('catGrid');

    const activeCategories = categories.filter(c => c.active !== false);

    grid.innerHTML = activeCategories.map(cat => `

      <div class="cat-card"
        onclick="location.href='../pages/shop.html?cat=${cat.slug}'">

        ${cat.image ? `

          <img
            src="${cat.image}"
            style="
              width:100%;
              height:100%;
              object-fit:cover;
              position:absolute;
              inset:0;
            ">

        ` : `

          <div class="cat-card-bg"
            style="background:linear-gradient(135deg,#ffd6e7,#ffb3d1);">

            ${cat.icon || '✨'}

          </div>

        `}

        <div class="cat-card-overlay">

          <div class="cat-card-name">
            ${cat.name}
          </div>

          <div class="cat-card-desc">
            ${cat.description || 'Premium collection'}
          </div>

          <div class="cat-card-btn">
            Shop Now →
          </div>

        </div>

      </div>

    `).join('');

  } catch (e) {

    console.error(e);

  }

}

loadCategories();
  </script>
</body>
</html>
