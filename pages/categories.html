<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories – SP GlowPetals</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/ti.jpeg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .cat-hero { background:linear-gradient(135deg,var(--pink-pale),white); padding:60px 0; text-align:center; border-bottom:1px solid var(--pink-light); }
    .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:28px; }
    .cat-card { border-radius:var(--radius-xl); overflow:hidden; position:relative; aspect-ratio:4/5; cursor:pointer; transition:var(--transition); box-shadow:var(--shadow-sm); }
    .cat-card:hover { transform:translateY(-8px); box-shadow:var(--shadow-lg); }
    .cat-card-bg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
    .cat-card-bg i { font-size:5rem; color:white; opacity:0.6; }
    .cat-card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(26,26,46,0.92) 0%,rgba(26,26,46,0.1) 60%,transparent 100%); display:flex; flex-direction:column; justify-content:flex-end; padding:28px; }
    .cat-card-name { font-family:var(--font-display); color:white; font-size:1.35rem; font-weight:600; margin-bottom:6px; }
    .cat-card-desc { color:rgba(255,255,255,0.72); font-size:0.83rem; margin-bottom:16px; line-height:1.5; }
    .cat-card-btn { display:inline-flex; align-items:center; gap:6px; background:white; color:var(--pink); padding:9px 18px; border-radius:30px; font-size:0.8rem; font-weight:700; transition:var(--transition); width:fit-content; }
    .cat-card:hover .cat-card-btn { background:var(--pink); color:white; }
    .cat-empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--gray-500); }
    .cat-empty i { font-size:3rem; color:var(--pink); opacity:0.3; margin-bottom:16px; }
    @media(max-width:600px){ .cat-grid{grid-template-columns:repeat(2,1fr);gap:14px;} .cat-card-name{font-size:1.05rem;} .cat-card-desc{display:none;} }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="cat-hero">
    <div class="container">
      <div class="breadcrumb" style="justify-content:center;">
        <a href="../index.html">Home</a><span>/</span><span class="current">Categories</span>
      </div>
      <span class="tag">Browse Collections</span>
      <h1 style="margin-top:14px;">All Gift Categories</h1>
      <p style="color:var(--gray-600);max-width:520px;margin:12px auto;">
        Explore our curated collections of premium gifts for every occasion and every budget.
      </p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="cat-grid" id="catGrid">
        <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--gray-500);">
          <i class="fa-solid fa-spinner fa-spin" style="font-size:1.8rem;color:var(--pink);"></i>
          <div style="margin-top:10px;">Loading categories…</div>
        </div>
      </div>
    </div>
  </section>

  <div class="newsletter-section">
    <div class="container">
      <h2>Get Gifting Inspiration &amp; Offers</h2>
      <p style="color:var(--gray-600);margin-top:8px;">Subscribe and be the first to know about new collections and exclusive deals.</p>
      <form class="newsletter-form" onsubmit="return false;">
        <input class="newsletter-input" type="email" placeholder="Your email address…" required>
        <button class="newsletter-btn" type="submit">
          <i class="fa-solid fa-paper-plane"></i> Subscribe
        </button>
      </form>
    </div>
  </div>

  <div id="footer"></div>
  <a href="https://wa.me/919384845814" target="_blank" class="whatsapp-float" title="Chat on WhatsApp">
    <div class="whatsapp-pulse"></div>
    <i class="fa-brands fa-whatsapp" style="font-size:1.6rem;color:white;"></i>
  </a>

  <script type="module">
    import { renderNavbar, renderFooter } from '../assets/js/components.js';
    import { listenCategories } from '../assets/js/firebase.js';

    await renderNavbar('categories');
    renderFooter();

    // Category icon colour palette
    const palettes = [
      'linear-gradient(135deg,#fce4ec,#f48fb1)',
      'linear-gradient(135deg,#fce4ec,#e91e63)',
      'linear-gradient(135deg,#f8bbd0,#ad1457)',
      'linear-gradient(135deg,#ffe0f0,#c2185b)',
      'linear-gradient(135deg,#ffd6e7,#e040fb)',
      'linear-gradient(135deg,#f3e5f5,#9c27b0)',
    ];

    function renderGrid(cats) {
      const grid = document.getElementById('catGrid');
      if (!grid) return;

      const active = cats.filter(c => c.active !== false);

      if (!active.length) {
        grid.innerHTML = `
          <div class="cat-empty">
            <i class="fa-solid fa-folder-open"></i>
            <div style="font-size:1rem;font-weight:600;margin-bottom:8px;">No categories yet</div>
            <div style="font-size:0.85rem;">The admin hasn't added any categories.</div>
          </div>`;
        return;
      }

      grid.innerHTML = active.map((cat, i) => {
        const bg = palettes[i % palettes.length];
        const iconClass = cat.icon && cat.icon.startsWith('fa-') ? cat.icon : 'fa-gift';
        return `
        <div class="cat-card" onclick="location.href='../pages/shop.html?cat=${encodeURIComponent(cat.slug || cat.id)}'">
          ${cat.image
            ? `<img src="${cat.image}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"
                 onerror="this.remove();this.parentElement.querySelector('.cat-card-bg').style.display='flex';">`
            : ''
          }
          <div class="cat-card-bg" style="background:${bg};${cat.image ? 'display:none;' : ''}">
            <i class="fa-solid ${iconClass}"></i>
          </div>
          <div class="cat-card-overlay">
            <div class="cat-card-name">${cat.name}</div>
            <div class="cat-card-desc">${cat.description || 'Premium collection'}</div>
            <div class="cat-card-btn">
              Shop Now <i class="fa-solid fa-arrow-right" style="font-size:0.75em;"></i>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // Real-time listener — instantly reflects admin add/delete
    listenCategories(renderGrid);
  </script>
</body>
</html>
